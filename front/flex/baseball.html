<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const jsonUrl = 'https://prof-jwchi.github.io/kopo-front2026/Json/baseball.json';

        fetch(jsonUrl)
            .then(response => response.json())
            .then(data => {
                let list = data.list;
                let tbody = document.querySelector("table tbody"); // tbody 선택
                tbody.innerHTML = ""; // 기존 내용 초기화

                for (let i = 0; i < list.length; i++) {
                    let team = list[i];

                    let tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${i + 1}</td>
                        <td>${team.shortNameKo}</td>
                        <td>${team.rank.game}</td>
                        <td>${team.rank.win}</td>
                        <td>${team.rank.draw}</td>
                        <td>${team.rank.loss}</td>
                        <td>${team.rank.wpct}</td>
                        <td>${team.rank.gb}</td>
                        <td>${team.rank.streak}</td>
                        `;

                    tbody.appendChild(tr);
        }
                    });
    </script>
    <style>
        #content{
            width:100%;
            height : 1000px;
            background-color : white;
            display : flex;
        }

            height: 100px;
        }

        .three{

            top: 50px;
            text-align:center;
            
        }
        .lg{

    </style>
</head>
<body>
