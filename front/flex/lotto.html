    <script>
        function getLotto(){

        let numbers = new Set();

        while(numbers.size < 6){
        const num = Math.floor(Math.random()*45)+1;
        numbers.add(num);
        }

        const result = [...numbers].sort((a,b)=>a-b);

        document.getElementById("b1").innerHTML = result[0];
        document.getElementById("b2").innerHTML = result[1];
        document.getElementById("b3").innerHTML = result[2];
        document.getElementById("b4").innerHTML = result[3];
        document.getElementById("b5").innerHTML = result[4];
        document.getElementById("b6").innerHTML = result[5];
}

    </script>
